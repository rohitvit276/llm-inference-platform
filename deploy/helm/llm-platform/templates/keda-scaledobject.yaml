{{- if .Values.autoscaling.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: llm-model
spec:
  scaleTargetRef:
    name: llm-model
  minReplicaCount: {{ .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.maxReplicas }}
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.autoscaling.prometheusAddress }}
        query: sum(rate(gateway_requests_total{path="/v1/chat/completions"}[1m]))
        threshold: {{ .Values.autoscaling.requestsPerSecondPerReplica | quote }}
{{- end }}
