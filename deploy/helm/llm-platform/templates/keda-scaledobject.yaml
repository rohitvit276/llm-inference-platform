{{- if .Values.autoscaling.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: llm-model
spec:
  scaleTargetRef:
    name: llm-model
  minReplicaCount: {{ .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.maxReplicas }}
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.autoscaling.prometheusAddress }}
        # In-flight requests (busy slots + queued) is the saturation signal.
        # Request rate can't work here: a saturated model caps throughput, so
        # the rate never rises above the threshold no matter how bad latency gets.
        query: sum(llamacpp:requests_processing) + sum(llamacpp:requests_deferred)
        threshold: {{ .Values.autoscaling.inflightPerReplica | quote }}
{{- end }}
