apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  labels:
    app: llm-gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: gateway
          image: {{ required "gateway.image must be set" .Values.gateway.image }}
          env:
            - name: MODEL_UPSTREAM
              value: http://llm-model:8080
            - name: API_KEYS
              value: {{ .Values.gateway.apiKeys | quote }}
            - name: RATE_LIMIT_PER_MINUTE
              value: {{ .Values.gateway.rateLimitPerMinute | quote }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
