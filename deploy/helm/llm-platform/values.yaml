model:
  image: ghcr.io/ggml-org/llama.cpp:server
  # Small instruct model quantized to ~400MB; runs well on 2 vCPU.
  ggufUrl: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
  contextSize: 2048
  parallelSlots: 2
  replicas: 1
  resources:
    requests:
      cpu: 750m  # ~2 replicas per 2-vCPU node; limit still allows bursting
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

gateway:
  image: ""  # set to <ecr-url>:<tag> at deploy time
  replicas: 1
  apiKeys: "dev-key"  # comma-separated; override via --set-string
  rateLimitPerMinute: 60
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: LoadBalancer  # NLB gives a public endpoint for load testing
    # Not 80: some ISPs transparently proxy port-80 HTTP and kill responses
    # slower than ~15s, which breaks long LLM generations.
    port: 8080

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  # Scale out when average in-flight requests (processing + queued) per
  # replica exceeds the parallel slot count, i.e. requests are queueing.
  inflightPerReplica: "2"
  prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090

monitoring:
  serviceMonitor:
    enabled: true
    release: kube-prometheus-stack
